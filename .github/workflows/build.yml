name: Build Driver Cloud

# Tu dong build installer cho Windows + macOS + Linux tren cloud cua GitHub.
# Chay khi push tag bat dau bang "v" (vd v0.2.6), hoac bam thu cong tab Actions.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # de electron-builder publish file cai vao GitHub Releases

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Build native Cloud Files addon (Windows, against Electron ABI)
        if: matrix.os == 'windows-latest'
        continue-on-error: true   # neu loi -> van build installer (app van chay, chi tat mount kieu Google)
        shell: bash
        run: |
          cd native/cloudfiles
          ELECTRON_VER=$(node -p "require('electron/package.json').version")
          echo "Electron $ELECTRON_VER"
          npx node-gyp rebuild --runtime=electron --target=$ELECTRON_VER --dist-url=https://electronjs.org/headers --arch=x64
      - name: Build installer
        # Khi push tag (v*) -> publish len GitHub Releases (de app tu cap nhat).
        # Khi bam Run workflow thuong -> chi build, khong publish.
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: driver-cloud-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
          if-no-files-found: ignore
