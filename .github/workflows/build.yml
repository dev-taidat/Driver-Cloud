name: Build Driver Cloud

# Tu dong build installer cho Windows + macOS + Linux tren cloud cua GitHub.
# Chay khi push tag bat dau bang "v" (vd v0.2.6), hoac bam thu cong tab Actions.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # de electron-builder publish file cai vao GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      # KHONG build native tren CI (node-gyp loi tren runner). Dung san native/cloudfiles/prebuilt/cloudfiles.node
      # (da build cho Electron ABI o may dev) -> dong goi qua win.extraResources.
      - name: Build installer
        # Khi push tag (v*) -> publish len GitHub Releases (de app tu cap nhat).
        # Khi bam Run workflow thuong -> chi build, khong publish.
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: driver-cloud-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
          if-no-files-found: ignore
