<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#7c5bff"/>
    </linearGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe6ff"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a1f3a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- nen bo tron gradient -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" fill="#ffffff" opacity="0.06"/>

  <!-- 3 lop "o dia" xep chong = gop nhieu account -->
  <g filter="url(#sh)">
    <ellipse cx="128" cy="170" rx="58" ry="20" fill="url(#disk)" opacity="0.55"/>
    <ellipse cx="128" cy="150" rx="58" ry="20" fill="url(#disk)" opacity="0.78"/>
    <ellipse cx="128" cy="130" rx="58" ry="20" fill="url(#disk)"/>
    <circle cx="128" cy="130" r="7" fill="#5b8cff"/>
  </g>

  <!-- dam may o tren = luu tru dam may -->
  <g filter="url(#sh)">
    <path d="M92 104
             a26 26 0 0 1 50 -10
             a22 22 0 0 1 30 22
             a20 20 0 0 1 -4 39
             h-78
             a24 24 0 0 1 2 -51
             z" fill="#ffffff"/>
    <!-- mui ten len = upload -->
    <path d="M128 70 l16 18 h-10 v20 h-12 v-20 h-10 z" fill="#5b8cff"/>
  </g>
</svg>
