<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Driver Cloud</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand"><span class="logo">☁️</span> Driver Cloud</div>
        <div class="searchbox">
          <span class="search-ic">🔍</span>
          <input id="search" placeholder="Tìm trong Driver Cloud" />
          <span id="searchClear" class="search-clear hidden">✕</span>
        </div>
        <div class="topright">
          <button id="openAccounts" class="icon-btn" title="Tài khoản & dung lượng">⚙️</button>
        </div>
      </header>

      <div class="body">
        <aside class="sidebar">
          <div class="new-wrap">
            <button id="newBtn" class="new-btn">＋ Mới</button>
            <div id="newMenu" class="menu hidden">
              <div class="menu-item" data-act="folder">📁 Thư mục mới</div>
              <div class="menu-item" data-act="upload">⬆️ Tải tệp lên</div>
            </div>
            <input id="fileInput" type="file" multiple class="hidden" />
          </div>
          <nav class="nav">
            <div class="nav-item active" id="navMyDrive">🗂️ Drive của tôi</div>
            <div class="nav-item" id="navTrash">🗑️ Thùng rác</div>
          </nav>
          <div class="storage">
            <div class="bar"><div id="usedBar"></div></div>
            <div id="storageText" class="muted small">—</div>
          </div>
        </aside>

        <main class="content" id="content">
          <div class="crumbs" id="crumbs"></div>
          <div id="emptyHint" class="empty-hint hidden"><div class="big">📂</div><p>Thư mục trống. Kéo-thả tệp vào đây hoặc bấm <b>＋ Mới</b>.</p></div>
          <div class="section" id="foldersSection"><div class="section-title">Thư mục</div><div id="folders" class="grid"></div></div>
          <div class="section" id="filesSection"><div class="section-title">Tệp</div><div id="files" class="grid"></div></div>
          <div id="dropOverlay" class="drop-overlay hidden"><div>Thả để tải lên</div></div>
        </main>
      </div>

      <div id="progressPanel" class="progress-panel hidden">
        <div class="pp-head"><span id="ppTitle">Đang tải lên</span><span id="ppClose">✕</span></div>
        <div id="ppList" class="pp-list"></div>
      </div>

      <div id="toasts"></div>
      <div id="ctxMenu" class="ctx hidden"></div>

      <div id="viewer" class="viewer hidden">
        <div class="viewer-bar">
          <span id="viewerTitle" class="viewer-title"></span>
          <div class="viewer-actions">
            <button id="viewerDownload" class="vbtn">⬇ Tải về</button>
            <button id="viewerClose" class="vbtn">✕</button>
          </div>
        </div>
        <div id="viewerBody" class="viewer-body"></div>
      </div>

      <div id="accModal" class="modal hidden">
        <div class="modal-card">
          <div class="modal-head"><h3>Tài khoản lưu trữ</h3><span id="accClose" class="modal-close">✕</span></div>
          <div id="accTotal" class="acc-total muted"></div>
          <div id="accList" class="acc-list"></div>
          <button id="addAccount" class="btn-primary full">＋ Thêm tài khoản Google</button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
