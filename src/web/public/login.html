<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Driver Cloud — Đăng nhập</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      body {
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        color: #202124; position: relative; overflow: hidden;
        background: #f5f7fb;
      }
      /* nen sang diu: vai vang mau rat nhat o goc, gan nhu tinh */
      body::before {
        content: ""; position: fixed; inset: 0; z-index: 0;
        background:
          radial-gradient(800px 480px at 12% 0%, rgba(91,140,255,.14), transparent 60%),
          radial-gradient(700px 460px at 100% 100%, rgba(124,91,255,.12), transparent 58%);
      }

      .card {
        position: relative; z-index: 2; width: 384px; max-width: 92vw; padding: 38px 34px 28px;
        background: #fff; border: 1px solid #e6e8ee; border-radius: 18px;
        box-shadow: 0 12px 40px rgba(60,64,90,.12);
        animation: rise .5s ease both;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

      .logo { display: flex; justify-content: center; margin-bottom: 16px; }
      .logo img {
        width: 66px; height: 66px; border-radius: 16px;
        box-shadow: 0 10px 24px rgba(91,110,210,.28);
        animation: bob 6s ease-in-out infinite;
      }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

      h1 { text-align: center; font-size: 22px; font-weight: 700; color: #1a1c23; letter-spacing: .2px; }
      h2 { text-align: center; font-size: 15px; font-weight: 600; margin-top: 18px; color: #2a2d36; }
      .sub { text-align: center; font-size: 13px; color: #6b7080; margin: 5px 0 20px; }

      input {
        width: 100%; padding: 12px 14px; margin: 7px 0; font-size: 14px; color: #1a1c23;
        background: #f7f8fb; border: 1px solid #dfe2ea; border-radius: 10px;
        transition: border-color .15s, box-shadow .15s, background .15s; outline: none;
      }
      input::placeholder { color: #9aa0b0; }
      input:focus { border-color: #5b8cff; background: #fff; box-shadow: 0 0 0 3px rgba(91,140,255,.16); }

      button {
        width: 100%; margin-top: 14px; padding: 12px; font-size: 15px; font-weight: 600; color: #fff;
        border: none; border-radius: 10px; cursor: pointer;
        background: linear-gradient(135deg, #5b8cff, #7c5bff);
        box-shadow: 0 8px 20px rgba(91,110,255,.3); transition: filter .15s, transform .1s;
      }
      button:hover { filter: brightness(1.06); }
      button:active { transform: translateY(1px); }

      .err { color: #d93025; font-size: 13px; min-height: 18px; text-align: center; margin-top: 10px; }
      .switch { text-align: center; font-size: 13px; color: #6b7080; margin-top: 4px; }
      .switch a { color: #1a73e8; text-decoration: none; font-weight: 600; }
      .switch a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo"><img src="/favicon.svg" alt="logo" /></div>
      <h1>Driver Cloud</h1>
      <h2 id="title">Đăng nhập</h2>
      <p class="sub" id="sub">Đăng nhập để vào kho lưu trữ của bạn.</p>
      <input id="username" placeholder="Tên đăng nhập" autocomplete="username" />
      <input id="pw" type="password" placeholder="Mật khẩu" autocomplete="current-password" />
      <button id="go"></button>
      <p id="err" class="err"></p>
      <p class="switch"><span id="switchText"></span> <a href="#" id="switchLink"></a></p>
    </div>

    <script>
      let mode = "login";
      const $ = (id) => document.getElementById(id);
      function applyMode() {
        const login = mode === "login";
        $("title").textContent = login ? "Đăng nhập" : "Đăng ký";
        $("sub").textContent = login ? "Đăng nhập để vào kho lưu trữ của bạn." : "Tạo tài khoản mới cho Driver Cloud.";
        $("go").textContent = login ? "Đăng nhập" : "Đăng ký";
        $("switchText").textContent = login ? "Chưa có tài khoản?" : "Đã có tài khoản?";
        $("switchLink").textContent = login ? "Đăng ký ngay" : "Đăng nhập";
        $("err").textContent = "";
      }
      $("switchLink").onclick = (e) => { e.preventDefault(); mode = mode === "login" ? "register" : "login"; applyMode(); };
      async function submit() {
        $("err").textContent = "";
        const body = JSON.stringify({ username: $("username").value, password: $("pw").value });
        const r = await fetch("/" + mode, { method: "POST", headers: { "Content-Type": "application/json" }, body });
        const d = await r.json().catch(() => ({}));
        if (r.ok) location.href = "/"; else $("err").textContent = d.error || "Lỗi.";
      }
      $("go").onclick = submit;
      $("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
      applyMode();
    </script>
  </body>
</html>
