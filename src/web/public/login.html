<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Driver Cloud — Đăng nhập</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      body {
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #0a0d16; color: #e7e9f0; position: relative; overflow: hidden;
      }
      /* nen toi diu: mot vang sang xanh rat nhe o tren, gan nhu tinh */
      body::before {
        content: ""; position: fixed; inset: 0; z-index: 0;
        background:
          radial-gradient(900px 500px at 50% -10%, rgba(91,140,255,.18), transparent 60%),
          radial-gradient(700px 500px at 85% 110%, rgba(124,91,255,.12), transparent 55%);
      }
      /* luoi mo nhe cho co chieu sau */
      body::after {
        content: ""; position: fixed; inset: 0; z-index: 0; opacity: .35;
        background-image:
          linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
        background-size: 46px 46px;
        mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
        -webkit-mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
      }

      .card {
        position: relative; z-index: 2; width: 384px; max-width: 92vw; padding: 36px 32px 28px;
        background: #11131d; border: 1px solid #232838; border-radius: 16px;
        box-shadow: 0 24px 60px rgba(0,0,0,.5);
        animation: rise .5s ease both;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      /* vien tren co diem nhan gradient mong */
      .card::before {
        content: ""; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
        background: linear-gradient(90deg, transparent, #5b8cff, #7c5bff, transparent);
      }

      .logo { display: flex; justify-content: center; margin-bottom: 16px; }
      .logo img {
        width: 64px; height: 64px; border-radius: 16px;
        box-shadow: 0 8px 22px rgba(60,80,180,.35);
        animation: bob 6s ease-in-out infinite;
      }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

      h1 { text-align: center; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: .2px; }
      h2 { text-align: center; font-size: 15px; font-weight: 600; margin-top: 18px; color: #fff; }
      .sub { text-align: center; font-size: 13px; color: #9096a8; margin: 5px 0 20px; }

      input {
        width: 100%; padding: 12px 14px; margin: 7px 0; font-size: 14px; color: #fff;
        background: #0c0e16; border: 1px solid #2a3045; border-radius: 10px;
        transition: border-color .15s, box-shadow .15s; outline: none;
      }
      input::placeholder { color: #6b7187; }
      input:focus { border-color: #5b8cff; box-shadow: 0 0 0 3px rgba(91,140,255,.18); }

      button {
        width: 100%; margin-top: 14px; padding: 12px; font-size: 15px; font-weight: 600; color: #fff;
        border: none; border-radius: 10px; cursor: pointer;
        background: linear-gradient(135deg, #5b8cff, #7c5bff);
        transition: filter .15s, transform .1s;
      }
      button:hover { filter: brightness(1.08); }
      button:active { transform: translateY(1px); }

      .err { color: #ff8a8a; font-size: 13px; min-height: 18px; text-align: center; margin-top: 10px; }
      .switch { text-align: center; font-size: 13px; color: #9096a8; margin-top: 4px; }
      .switch a { color: #87a9ff; text-decoration: none; font-weight: 600; }
      .switch a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo"><img src="/favicon.svg" alt="logo" /></div>
      <h1>Driver Cloud</h1>
      <h2 id="title">Đăng nhập</h2>
      <p class="sub" id="sub">Đăng nhập để vào kho lưu trữ của bạn.</p>
      <input id="username" placeholder="Tên đăng nhập" autocomplete="username" />
      <input id="pw" type="password" placeholder="Mật khẩu" autocomplete="current-password" />
      <button id="go"></button>
      <p id="err" class="err"></p>
      <p class="switch"><span id="switchText"></span> <a href="#" id="switchLink"></a></p>
    </div>

    <script>
      let mode = "login";
      const $ = (id) => document.getElementById(id);
      function applyMode() {
        const login = mode === "login";
        $("title").textContent = login ? "Đăng nhập" : "Đăng ký";
        $("sub").textContent = login ? "Đăng nhập để vào kho lưu trữ của bạn." : "Tạo tài khoản mới cho Driver Cloud.";
        $("go").textContent = login ? "Đăng nhập" : "Đăng ký";
        $("switchText").textContent = login ? "Chưa có tài khoản?" : "Đã có tài khoản?";
        $("switchLink").textContent = login ? "Đăng ký ngay" : "Đăng nhập";
        $("err").textContent = "";
      }
      $("switchLink").onclick = (e) => { e.preventDefault(); mode = mode === "login" ? "register" : "login"; applyMode(); };
      async function submit() {
        $("err").textContent = "";
        const body = JSON.stringify({ username: $("username").value, password: $("pw").value });
        const r = await fetch("/" + mode, { method: "POST", headers: { "Content-Type": "application/json" }, body });
        const d = await r.json().catch(() => ({}));
        if (r.ok) location.href = "/"; else $("err").textContent = d.error || "Lỗi.";
      }
      $("go").onclick = submit;
      $("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
      applyMode();
    </script>
  </body>
</html>
